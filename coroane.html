<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coroane Funerare - Casa Funerară Lupică</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- STIL SPECIFIC GRID COROANE -->
    <style>
        .hero { position: relative; color: white; text-align: center; padding: 60px 0; background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6)); min-height: 30vh; display: flex; align-items: center; clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        .hero-content { max-width: 800px; margin: 0 auto; position: relative; z-index: 2; padding: 0 15px; }
        .coroane-section { padding: 40px 0 80px; background-color: rgba(30, 30, 30, 0.8); }
        .coroane-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        .coroana-item { display: flex; flex-direction: column; align-items: center; transition: var(--transition); transform: translateY(20px); opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .coroana-item.visible { opacity: 1; transform: translateY(0); }
        .coroana-image-container { width: 100%; height: 300px; overflow: hidden; border-radius: 8px; background-color: rgba(40, 40, 40, 0.9); display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: var(--transition); }
        .coroana-item:hover .coroana-image-container { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
        .coroana-image { max-width: 90%; max-height: 90%; object-fit: contain; transition: var(--transition); opacity: 0.7; }
        .coroana-name { font-size: 1.1rem; color: #f0f0f0; text-align: center; font-family: 'Cinzel', serif; padding: 10px 0; width: 100%; background-color: rgba(139, 115, 85, 0.1); border-radius: 4px; }
        .coroana-item:hover .coroana-name { background-color: rgba(139, 115, 85, 0.2); color: var(--primary-light); }
        @media (min-width: 768px) { .coroane-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; } }
    </style>
</head>

<body data-page="coroane">
    <div class="content-fade" id="contentFade">
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h2>Colecție Coroane Funerare</h2>
                    <p>Aranjamente realizate manual din flori proaspete sau artificiale pentru un ultim omagiu plin de demnitate.</p>
                </div>
            </div>
        </section>

        <section class="coroane-section">
            <div class="container">
                <div class="section-title"><h2>Galerie Modele</h2></div>
                <div class="coroane-grid" id="coroaneGrid"></div>
            </div>
        </section>
    </div>

    <!-- LOGIC BUILDER -->
    <script src="global.js"></script>
    <script>
        function loadCoroaneGrid() {
            const grid = document.getElementById('coroaneGrid');
            if (!grid) return;
            const TOTAL_COROANE = 40;
            
            for (let i = 1; i <= TOTAL_COROANE; i++) {
                const item = document.createElement('div');
                item.className = 'coroana-item';
                item.style.animationDelay = `${(i % 8) * 0.1}s`;

                const container = document.createElement('div');
                container.className = 'coroana-image-container';

                const img = document.createElement('img');
                img.className = 'coroana-image';
                img.src = `https://via.placeholder.com/300x300/2a2a2a/555555?text=Corona+${i}`;
                img.loading = 'lazy';

                // Schimbăm asincron cu imaginea reală locală
                setTimeout(() => {
                    const realImg = new Image();
                    realImg.onload = () => { img.src = realImg.src; img.style.opacity = '1'; };
                    realImg.src = `images/Coroana ${i}.png`;
                }, 200 + (i * 30));

                const name = document.createElement('div');
                name.className = 'coroana-name';
                name.textContent = `Coroana Model ${i}`;

                container.appendChild(img);
                item.appendChild(container);
                item.appendChild(name);
                grid.appendChild(item);
            }
            
            // Re-trigger observer pentru animații la scroll
            if ('IntersectionObserver' in window) {
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.coroana-item').forEach(el => obs.observe(el));
            }
        }
        document.addEventListener('DOMContentLoaded', loadCoroaneGrid);
    </script>
</body>
</html>
