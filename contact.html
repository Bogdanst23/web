<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Casa Funerară Lupică</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- STYLE SPECIFIC PAGINII DE CONTACT -->
    <style>
        .page-title { text-align: center; color: var(--primary-color); margin: 40px 0 50px; font-size: 2.2rem; }
        .contact-container { display: flex; flex-wrap: wrap; gap: 40px; margin-bottom: 60px; }
        .contact-info, .contact-form { flex: 1; min-width: 300px; background: rgba(26, 26, 26, 0.7); padding: 30px; border-radius: 10px; border: 1px solid rgba(139,115,85,0.3); backdrop-filter: blur(8px); }
        .contact-info h2, .contact-form h2 { color: var(--primary-color); margin-top: 0; font-size: 1.8rem; border-bottom: 1px solid rgba(139,115,85,0.3); padding-bottom: 15px; }
        .contact-details { margin: 25px 0; }
        .contact-item { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .contact-icon { color: var(--primary-color); font-size: 1.2rem; margin-right: 15px; width: 20px; text-align: center; }
        .contact-text h3 { margin: 0 0 5px; font-size: 1.1rem; color: var(--text-color); }
        .contact-text p { margin: 0; color: var(--text-light); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-color); }
        .form-control { width: 100%; padding: 12px 15px; background: rgba(40, 40, 40, 0.8); border: 1px solid rgba(139,115,85,0.3); border-radius: 4px; color: white; }
        textarea.form-control { min-height: 120px; resize: vertical; }
        .btn-block { display: block; width: 100%; }
        
        .map-container { margin-top: 40px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(139,115,85,0.3); height: 450px; position: relative; }
        .map-frame { width: 100%; height: 100%; border: none; }
        .map-overlay { position: absolute; top: 20px; right: 20px; background: rgba(26, 26, 26, 0.9); padding: 15px; border-radius: 8px; max-width: 300px; border: 1px solid rgba(139,115,85,0.3); }
        .success-message { display: none; background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; color: #28a745; padding: 15px; border-radius: 4px; margin-top: 20px; text-align: center; }
        
        @media (max-width: 767px) {
            .contact-container { flex-direction: column; }
            .map-container { height: 350px; }
            .map-overlay { position: relative; top: 0; right: 0; margin-top: 20px; }
        }
    </style>
</head>

<body data-page="contact">
    <div class="content-fade" id="contentFade">
        <h1 class="page-title">Contactați-ne</h1>
        
        <div class="container">
            <div class="contact-container">
                <!-- Informații Stânga -->
                <div class="contact-info">
                    <h2>Informații de asistență</h2>
                    <div class="contact-details">
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="contact-text"><h3>Adresă</h3><p>Strada Principală, Oituz</p></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-phone"></i></div>
                            <div class="contact-text"><h3>Telefon Non-Stop</h3><p class="phone-number">0752 538 888</p></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                            <div class="contact-text"><h3>Email</h3><p>contact@casafuneraralupica.ro</p></div>
                        </div>
                    </div>
                </div>

                <!-- Formular Dreapta -->
                <div class="contact-form">
                    <h2>Trimiteți un mesaj rapid</h2>
                    <form id="messageForm">
                        <div class="form-group">
                            <label for="name">Nume și prenume</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Număr de telefon</label>
                            <input type="tel" id="phone" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Mesajul dvs.</label>
                            <textarea id="message" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-block"><i class="fas fa-paper-plane"></i> Trimite prin SMS</button>
                        <div id="successMessage" class="success-message"><i class="fas fa-check-circle"></i> Mesajul a fost procesat!</div>
                    </form>
                </div>
            </div>

            <!-- Hartă Google Maps Hidratată Securizat -->
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4779.870349674047!2d26.613562954381955!3d46.20611680040304!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40b5030657bcebe7%3A0x2fe1a961c9cc6c17!2sCasa%20Funerar%C4%83%20Lupic%C4%83!5e0!3m2!1sen!2sro!4v1764947435250!5m2!1sen!2sro" class="map-frame" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                <div class="map-overlay">
                    <h3>Casa Funerară Lupică</h3>
                    <p><i class="fas fa-map-pin"></i> Oituz, România</p>
                    <p><i class="fas fa-clock"></i> Program de urgență: Non-stop 24/7</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT DE TRIMITERE CONTEXTUALĂ -->
    <script src="global.js"></script>
    <script>
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            
            const smsBody = `Mesaj site Lupica:\nNume: ${name}\nTel client: ${phone}\nMesaj: ${message}`;
            window.location.href = `sms:0752538888?body=${encodeURIComponent(smsBody)}`;
            
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            this.reset();
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        });
    </script>
</body>
</html>
